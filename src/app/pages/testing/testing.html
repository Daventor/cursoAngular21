<p>testing works!</p>

<h1>{{ title() }}</h1>

<button (click)="increment()">{{ value() }}</button>

<input type="text" [(ngModel)]="name">

<div class="title-case">{{ name }}</div>

<hr>

@if(auth.isLoggedIn()){
    <button class="login" (click)="auth.logout()">Logout</button>
}@else {
    <span>Login</span>
}
<p class="quote">
    <i>{{ quote | async }}</i>
</p>
<button class="nextQuoteBtn" type="button" (click)="getQuote()">Siguiente cita</button>
